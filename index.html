<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Быстрая и точная проверка OS Mismatch / Proxy</title>
    <style>
        body { background: #181818; color: #38f1; font-family: monospace; padding: 30px; }
        .main { max-width: 700px; margin: 0 auto; }
        .result { background: #222; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .json { background: #111; color: #0fa; padding: 10px; border-radius: 6px; font-size: 15px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="main">
    <h2>Проверка Proxy/WebRTC и OS Mismatch (ускоренная)</h2>
    <div id="results" class="result">Проверка...</div>
</div>

<script>
// 1. Получить основные признаки User-Agent
function getDeviceOs() {
    const userAgent = navigator.userAgent;
    if (/Windows/i.test(userAgent)) return "Windows";
    if (/Mac OS X/i.test(userAgent)) return "macOS";
    if (/Android/i.test(userAgent)) return "Android";
    if (/iPhone|iPad/i.test(userAgent)) return "iOS";
    if (/Linux/i.test(userAgent)) return "Linux";
    return "Unknown";
}
function isMobile() {
    return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
}

// 2. Fingerprint устройства (минимум)
function getOSFingerprint() {
    const touch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    const platform = navigator.platform || 'unknown';
    const deviceMem = navigator.deviceMemory || '?';
    const logicalCores = navigator.hardwareConcurrency || '?';
    const screenW = screen.width;
    const screenH = screen.height;
    const hasDevMotion = typeof DeviceMotionEvent !== "undefined";
    const hasTouchEvent = typeof TouchEvent !== "undefined";
    return { touch, platform, deviceMem, logicalCores, screenW, screenH, hasDevMotion, hasTouchEvent };
}

// 3. Логика расширенного osMismatch
function deepOsMismatch(userOs, osFp) {
    if (['Android','iOS'].includes(userOs)) {
        if (!osFp.touch) return true;
        if (osFp.screenW > 1200 || osFp.screenH > 1200) return true;
        if (osFp.platform.match(/Win|Mac|Linux/)) return true;
        if (!osFp.hasDevMotion || !osFp.hasTouchEvent) return true;
        if (osFp.logicalCores && osFp.logicalCores > 8) return true;
        if (osFp.deviceMem && osFp.deviceMem > 8) return true;
    }
    if (userOs === "Windows") {
        if (osFp.touch && osFp.screenW < 1000) return true;
        if (!osFp.platform.match(/Win/)) return true;
    }
    if (userOs === "macOS") {
        if (osFp.touch) return true;
        if (!osFp.platform.match(/Mac/)) return true;
    }
    return false;
}

// 4. Дополнительные проверки (для ПК)
async function getPublicIP() {
    try {
        let res = await fetch("https://api.ipify.org?format=json");
        let data = await res.json();
        return data.ip;
    } catch (e) {
        return null;
    }
}
function getWebRTCIps(timeoutMs=3000) {
    return new Promise((resolve) => {
        let ips = new Set();
        let done = false;
        let pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
        pc.createDataChannel("");
        pc.onicecandidate = (evt) => {
            if (!evt.candidate) return;
            let candidate = evt.candidate.candidate;
            let found = candidate.match(/(\d+\.\d+\.\d+\.\d+)/g);
            if (found) found.forEach(ip => ips.add(ip));
        };
        pc.onicegatheringstatechange = () => {
            if (pc.iceGatheringState === "complete" && !done) {
                done = true;
                pc.close();
                resolve(Array.from(ips));
            }
        };
        setTimeout(() => {
            if (!done) {
                done = true;
                pc.close();
                resolve(Array.from(ips));
            }
        }, timeoutMs);
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
    });
}
async function getIpInfo(ip) {
    try {
        const res = await fetch(`https://ip-api.io/json/${ip}`);
        const data = await res.json();
        return data;
    } catch {
        return null;
    }
}
function isIpOsMismatch(ipInfo, userOs) {
    if (!ipInfo || !userOs) return false;
    let org = (ipInfo.organization || '').toLowerCase();
    let connType = (ipInfo.connection_type || '').toLowerCase();
    let isMobileOrg = org.includes('mobile') || org.includes('cellular') || connType === 'mobile';
    let isHosting = org.includes('host') || org.includes('server') || org.includes('vps') || org.includes('cloud');
    if (['Android', 'iOS'].includes(userOs) && isHosting) return true;
    if (['Windows', 'macOS', 'Linux'].includes(userOs) && isMobileOrg) return true;
    return false;
}

// 5. Основная функция
(async function runCheck(){
    let results = document.getElementById("results");
    results.textContent = "Проверяем...";

    let userOs = getDeviceOs();
    let mobile = isMobile();
    let osFp = getOSFingerprint();
    let osMismatch = deepOsMismatch(userOs, osFp);

    if(mobile){
        // Только быстрый fingerprint-анализ, никаких сетевых задержек!
        let html = `
            <b>User-Agent OS:</b> <span>${userOs}</span><br>
            <b>Тип устройства:</b> <span>Мобильный</span><br>
            <b><span style="color:#fff">osMismatch:</span> <span style="color:${osMismatch ? 'orange' : 'lime'};font-weight:bold">${osMismatch}</span></b><br>
            <br>
        `;
        if(osMismatch){
            html += `<b style="color:orange;">⚠️ Есть признаки эмуляции или подмены мобильного устройства ("osMismatch": true)</b><br>`;
        }else{
            html += `<b style="color:lime;">Всё выглядит как настоящий мобильный.</b>`;
        }
        html += `<div class="json"><pre>${JSON.stringify({
            userOS: userOs,
            osMismatch,
            fp: osFp
        }, null, 2)}</pre></div>`;
        results.innerHTML = html;
        return;
    }

    // Для ПК - стандартная полная проверка (IP, WebRTC, ASN, osMismatch)
    let publicIP = await getPublicIP();
    let webrtcIps = await getWebRTCIps();
    let ipInfo = publicIP ? await getIpInfo(publicIP) : null;
    osMismatch = isIpOsMismatch(ipInfo, userOs) || deepOsMismatch(userOs, osFp);

    let html = `
        <b>Ваш публичный IP (HTTP):</b> <span>${publicIP || 'Ошибка'}</span><br>
        <b>Ваши IP через WebRTC (UDP):</b> <span>${webrtcIps.length ? webrtcIps.join(', ') : 'Не удалось получить (UDP/WebRTC заблокирован)'}</span><br>
        <b>User-Agent OS:</b> <span>${userOs}</span><br>
        <b>Тип устройства:</b> <span>Десктоп</span><br>
        <b>IP ASN/ISP:</b> <span>${ipInfo ? ipInfo.organization : 'Неизвестно'}</span><br>
        <b>Тип подключения (по данным IP):</b> <span>${ipInfo ? ipInfo.connection_type : 'Неизвестно'}</span><br>
        <b><span style="color:#fff">osMismatch:</span> <span style="color:${osMismatch ? 'orange' : 'lime'};font-weight:bold">${osMismatch}</span></b><br>
        <br>
    `;
    if (osMismatch) {
        html += `<b style="color:orange;">Обнаружено расширенное несоответствие между вашей ОС и поведением устройства ("osMismatch": true)</b>
        <br>Это признак использования прокси, антидетект-браузера, эмулятора или подмены устройства.<br><br>`;
    }

    if (!webrtcIps.length) {
        html += `<b style="color:orange;">UDP или WebRTC-запросы заблокированы!</b>
        <br>Это может быть прокси, антидетект-браузер или блокировка UDP/WebRTC.`;
    } else if (webrtcIps.includes(publicIP)) {
        html += `<b style="color:lime;">IP через UDP/WebRTC совпадает с HTTP — всё нормально!</b>
        <br>Обычный интернет, без скрытых прокси и антидетектов.`;
    } else {
        html += `<b style="color:red;">Обнаружено несоответствие IP!</b>
        <br>Это может быть признаком использования прокси/VPN/антидетекта.<br>
        <small>Если вы не используете мобильный интернет и ваш браузер обычный, возможно, применяется прокси/антидетект или браузер с подменой WebRTC.</small>`;
    }

    html += `<div class="json"><pre>${JSON.stringify({
        publicIP: publicIP || 'Ошибка',
        userOS: userOs,
        osMismatch,
        webrtcIps,
        isp: ipInfo ? ipInfo.organization : 'Неизвестно',
        connectionType: ipInfo ? ipInfo.connection_type : 'Неизвестно',
        fp: osFp
    }, null, 2)}</pre></div>`;

    results.innerHTML = html;
})();
</script>
</body>
</html>
