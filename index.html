<!DOCTYPE html>
<html>
<head>
  <title>WebRTC IP Leak Detector</title>
  <script>
    async function detectIPLeak() {
      const loading = document.getElementById('loadingIndicator');
      const result = document.getElementById('finalNote');
      
      loading.style.display = 'block';
      
      try {
        const ips = await getWebRTCIPs();
        
        if (ips.length > 0) {
          result.textContent = `REAL IP LEAKED: ${ips.join(', ')}`;
          setTimeout(() => {
            window.location.href = 'https://t.me/your_bot'; // Без UTM
          }, 3000);
        } else {
          result.textContent = 'No IP leaks detected';
          setTimeout(() => {
            window.location.href = 'https://t.me/your_bot?utm_source=ads'; // С UTM
          }, 3000);
        }
      } catch (e) {
        result.textContent = 'Error: ' + e.message;
      } finally {
        loading.style.display = 'none';
      }
    }

    function getWebRTCIPs() {
      return new Promise((resolve) => {
        const leakedIPs = [];
        const pc = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });

        pc.onicecandidate = (event) => {
          if (!event.candidate) {
            pc.close();
            resolve(leakedIPs);
            return;
          }
          
          const candidate = event.candidate.candidate;
          const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/gi;
          const match = candidate.match(ipRegex);
          
          if (match) {
            const ip = match[0];
            // Фильтр приватных и локальных IP
            if (!ip.startsWith('192.168.') && 
                !ip.startsWith('10.') && 
                !ip.startsWith('172.16.') &&
                ip !== '127.0.0.1' &&
                ip !== '0.0.0.0') {
              leakedIPs.push(ip);
            }
          }
        };

        pc.createDataChannel("");
        pc.createOffer()
          .then(offer => pc.setLocalDescription(offer))
          .catch(console.error);
      });
    }
  </script>
</head>
<body onload="detectIPLeak()">
  <div id="loadingIndicator">Detecting IP leaks...</div>
  <div id="finalNote"></div>
</body>
</html>
