<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Information</title>
    <!-- Оптимизация предзагрузки -->
    <link rel="dns-prefetch" href="https://fp.spiritguidetg.store">
    <link rel="preconnect" href="https://fp.spiritguidetg.store" crossorigin>
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }
        .info-item {
            margin: 15px 0;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 18px;
        }
        .info-label {
            font-weight: bold;
            display: inline-block;
            width: 120px;
        }
        #loader {
            text-align: center;
            padding: 30px;
        }
        #retry-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader">Загрузка данных...</div>
        <div id="result" style="display: none;">
            <div class="info-item">
                <span class="info-label">Visitor ID:</span>
                <span id="visitorId"></span>
            </div>
            <div class="info-item">
                <span class="info-label">Request ID:</span>
                <span id="requestId"></span>
            </div>
        </div>
    </div>

    <script>
        const FP_URL = 'https://fp.spiritguidetg.store/web/v3/Ki8goVOk05JAcbWpUsmw';
        const TIMEOUT_DURATION = 10000; // 10 секунд таймаут
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        async function loadFingerprintJS() {
            try {
                // Для мобильных устройств используем более агрессивный таймаут
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), isMobile ? TIMEOUT_DURATION : TIMEOUT_DURATION * 2);
                
                const FingerprintJS = await import(FP_URL, {
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                const fp = await FingerprintJS.load({ region: 'eu' });
                const result = await fp.get({ extendedResult: true });
                
                return result;
            } catch (error) {
                if (error.name === 'AbortError') {
                    throw new Error('Превышено время ожидания. Проверьте интернет-соединение.');
                }
                throw error;
            }
        }

        function showError(message) {
            document.getElementById('loader').innerHTML = `
                <div style="color: #e74c3c; text-align: center;">
                    <h3>Ошибка загрузки данных</h3>
                    <p>${message}</p>
                    <button id="retry-btn">Попробовать снова</button>
                </div>
            `;
            
            document.getElementById('retry-btn').addEventListener('click', init);
        }

        async function init() {
            try {
                document.getElementById('loader').style.display = 'block';
                document.getElementById('result').style.display = 'none';
                document.getElementById('loader').textContent = 'Загрузка данных...';
                
                const result = await loadFingerprintJS();
                
                document.getElementById('visitorId').textContent = result.visitorId;
                document.getElementById('requestId').textContent = result.requestId;
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('result').style.display = 'block';
            } catch (error) {
                showError(error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
