<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка IP, UDP (WebRTC) и OS Mismatch</title>
    <style>
        body { background: #181818; color: #38f1; font-family: monospace; padding: 30px; }
        .main { max-width: 600px; margin: 0 auto; }
        .result { background: #222; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .json { background: #111; color: #0fa; padding: 10px; border-radius: 6px; font-size: 15px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="main">
    <h2>Проверка IP, UDP (WebRTC) и OS Mismatch</h2>
    <div id="results" class="result">Проверка...</div>
</div>

<script>
// 1. Получить публичный IP
async function getPublicIP() {
    try {
        let res = await fetch("https://api.ipify.org?format=json");
        let data = await res.json();
        return data.ip;
    } catch (e) {
        return null;
    }
}

// 2. Получить IP через WebRTC (UDP ICE)
function getWebRTCIps(timeoutMs=3000) {
    return new Promise((resolve) => {
        let ips = new Set();
        let done = false;
        let pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
        pc.createDataChannel("");

        pc.onicecandidate = (evt) => {
            if (!evt.candidate) return;
            let candidate = evt.candidate.candidate;
            let regex = /((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)/g;
            let found = candidate.match(regex);
            if (found) found.forEach(ip => ips.add(ip));
        };

        pc.onicegatheringstatechange = () => {
            if (pc.iceGatheringState === "complete" && !done) {
                done = true;
                pc.close();
                resolve(Array.from(ips));
            }
        };

        setTimeout(() => {
            if (!done) {
                done = true;
                pc.close();
                resolve(Array.from(ips));
            }
        }, timeoutMs);

        pc.createOffer().then(offer => pc.setLocalDescription(offer));
    });
}

// 3. Определить тип устройства и ОС
function getDeviceOs() {
    const userAgent = navigator.userAgent;
    if (/Windows/i.test(userAgent)) return "Windows";
    if (/Mac OS X/i.test(userAgent)) return "macOS";
    if (/Android/i.test(userAgent)) return "Android";
    if (/iPhone|iPad/i.test(userAgent)) return "iOS";
    if (/Linux/i.test(userAgent)) return "Linux";
    return "Unknown";
}
function isMobile() {
    return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
}

// 4. Получить инфу об IP (ASN, ISP, тип подключения)
async function getIpInfo(ip) {
    try {
        // Можно использовать любой сервис, здесь ip-api.io (работает без API-ключа)
        const res = await fetch(`https://ip-api.io/json/${ip}`);
        const data = await res.json();
        return data;
    } catch {
        return null;
    }
}

// 5. Проверить osMismatch
function isOsMismatch(ipInfo, userOs) {
    if (!ipInfo || !userOs) return false;
    let org = (ipInfo.organization || '').toLowerCase();
    let connType = (ipInfo.connection_type || '').toLowerCase();
    let isMobileOrg = org.includes('mobile') || org.includes('cellular') || connType === 'mobile';
    let isHosting = org.includes('host') || org.includes('server') || org.includes('vps') || org.includes('cloud');

    // Android/iOS + датацентр = mismatch
    if (['Android', 'iOS'].includes(userOs) && isHosting) return true;
    // Windows/macOS/Linux + мобильный оператор = mismatch
    if (['Windows', 'macOS', 'Linux'].includes(userOs) && isMobileOrg) return true;
    return false;
}

// 6. Основная функция
async function runCheck() {
    let results = document.getElementById("results");
    results.textContent = "Проверяем...";

    let publicIP = await getPublicIP();
    let webrtcIps = await getWebRTCIps();
    let userOs = getDeviceOs();
    let mobile = isMobile();
    let ipInfo = publicIP ? await getIpInfo(publicIP) : null;
    let osMismatch = isOsMismatch(ipInfo, userOs);

    let html = `
        <b>Ваш публичный IP (HTTP):</b> <br> <span>${publicIP || 'Ошибка'}</span><br>
        <b>Ваши IP через WebRTC (UDP):</b> <br> <span>${webrtcIps.length ? webrtcIps.join(', ') : 'Не удалось получить (UDP/WebRTC заблокирован)'}</span><br>
        <b>User-Agent OS:</b> <span>${userOs}</span><br>
        <b>Тип устройства:</b> <span>${mobile ? "Мобильный" : "Десктоп"}</span><br>
        <b>IP ASN/ISP:</b> <span>${ipInfo ? ipInfo.organization : 'Неизвестно'}</span><br>
        <b>Тип подключения (по данным IP):</b> <span>${ipInfo ? ipInfo.connection_type : 'Неизвестно'}</span><br>
        <b><span style="color:#fff">osMismatch:</span> <span style="color:${osMismatch ? 'orange' : 'lime'};font-weight:bold">${osMismatch ? 'true' : 'false'}</span></b><br>
        <br>
    `;

    // osMismatch объяснение
    if (osMismatch) {
        html += `<b style="color:orange;">Обнаружено несоответствие между вашей ОС и IP ("osMismatch": true)</b>
        <br>Это частый признак использования прокси, антидетект-браузера или эмулятора!<br><br>`;
    }

    // UDP/WebRTC блок/совпадение/разница
    if (!webrtcIps.length) {
        html += `<b style="color:orange;">UDP или WebRTC-запросы заблокированы!</b>
        <br>Это может быть прокси, антидетект-браузер или специально заблокированный UDP/WebRTC.`;
    } else if (webrtcIps.includes(publicIP)) {
        html += `<b style="color:lime;">IP через UDP/WebRTC совпадает с HTTP — всё нормально!</b>
        <br>Обычный интернет, без скрытых прокси и антидетектов.`;
    } else {
        if (mobile) {
            html += `<b style="color:gold;">На мобильных соединениях (3G/4G/5G) часто разные IP — это нормально!</b>`;
        } else {
            html += `<b style="color:red;">Обнаружено несоответствие IP!</b>
            <br>Это может быть признаком использования прокси/VPN/антидетекта.<br>
            <small>Если вы не используете мобильный интернет и ваш браузер обычный, возможно, применяется прокси/антидетект/браузер с подменой WebRTC.</small>`;
        }
    }

    // JSON-блок для копирования/автоматизации
    html += `<div class="json"><pre>{
  "publicIP": "${publicIP || 'Ошибка'}",
  "userOS": "${userOs}",
  "osMismatch": ${osMismatch},
  "webrtcIps": ${JSON.stringify(webrtcIps)},
  "isp": "${ipInfo ? ipInfo.organization : 'Неизвестно'}",
  "connectionType": "${ipInfo ? ipInfo.connection_type : 'Неизвестно'}"
}</pre></div>`;

    results.innerHTML = html;
}

runCheck();
</script>
</body>
</html>
