<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FingerprintJS Identifiers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: left;
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card-title {
            display: flex;
            align-items: center;
            color: #2c3e50;
            margin-bottom: 15px;
            font-weight: 600;
            font-size: 1.2rem;
        }
        
        .card-title svg {
            margin-right: 10px;
            width: 24px;
            height: 24px;
        }
        
        .identifier {
            display: block;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            word-break: break-all;
            color: #e74c3c;
            border: 1px solid #e9ecef;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        
        .identifier:hover {
            background: #e9ecef;
            box-shadow: 0 0 0 2px #3498db;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(52, 152, 219, 0.2);
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 30px;
        }
        
        .badge {
            display: inline-block;
            background: rgba(231, 76, 60, 0.2);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 0 5px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FingerprintJS Identifiers</h1>
            <p class="subtitle">Ваши уникальные идентификаторы, полученные с помощью технологии FingerprintJS</p>
        </div>
        
        <div class="card">
            <div class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y3="14"></line>
                    <line x1="23" y1="11" x2="17" y3="11"></line>
                </svg>
                Visitor ID
            </div>
            <div id="visitorId" class="loading">
                <div class="loader"></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
                Request ID
            </div>
            <div id="requestId" class="loading">
                <div class="loader"></div>
            </div>
        </div>
        
        <div class="footer">
            <span class="badge">FingerprintJS</span> 
            <span class="badge">VisitorID</span> 
            <span class="badge">RequestID</span>
            <p style="margin-top: 15px;">Идентификаторы обновляются при каждом новом запросе</p>
        </div>
    </div>

    <script>
        // Initialize FingerprintJS agent
        const fpPromise = import('https://spiritguidetg.ru/NPf7MrGIB7Xfd50d/J3QcYpxrmV0uEmiz?apiKey=Ki8goVOk05JAcbWpUsmw')
            .then(FingerprintJS => FingerprintJS.load({
                endpoint: [
                    "https://spiritguidetg.ru/NPf7MrGIB7Xfd50d/NcTotKlhGHxdV9WH?region=eu",
                    FingerprintJS.defaultEndpoint
                ],
                region: "eu"
            }))
        
        // Get identifiers and display them
        fpPromise
            .then(fp => fp.get())
            .then(result => {
                // Display visitorId
                const visitorIdEl = document.getElementById('visitorId');
                visitorIdEl.innerHTML = `<span class="identifier">${result.visitorId}</span>`;
                
                // Display requestId
                const requestIdEl = document.getElementById('requestId');
                requestIdEl.innerHTML = `<span class="identifier">${result.requestId}</span>`;
            })
            .catch(error => {
                console.error('FingerprintJS error:', error);
                
                const errorHTML = `<div style="color: #e74c3c; padding: 15px; background: #fdecea; border-radius: 8px; border: 1px solid #fadbd8;">
                    <strong>Ошибка:</strong> ${error.message || 'Не удалось получить идентификаторы'}
                </div>`;
                
                document.getElementById('visitorId').innerHTML = errorHTML;
                document.getElementById('requestId').innerHTML = errorHTML;
            });
    </script>
</body>
</html>
