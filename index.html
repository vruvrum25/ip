<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDP Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: white;
            margin: 50px;
            text-align: center;
        }
        .result {
            font-size: 24px;
            margin: 20px 0;
        }
        .time {
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="result" class="result">Проверка UDP...</div>
    <div id="time" class="time"></div>

    <script type="module">
        (async () => {
            const startTime = performance.now();
            
            try {
                // Быстрая проверка UDP блокировки
                const isUDPBlocked = await new Promise((resolve) => {
                    const timeout = setTimeout(() => resolve(true), 2000); // 2 сек таймаут
                    let resolved = false; // Флаг для предотвращения двойного resolve
                    
                    try {
                        const pc = new RTCPeerConnection({
                            iceServers: [
                                { urls: 'stun:stun.sipnet.ru:3478' },      // Российский первым
                                { urls: 'stun:stun.l.google.com:19302' }   // Google вторым
                            ]
                        });
                        
                        pc.onicecandidate = (e) => {
                            if (!resolved && e.candidate && e.candidate.candidate.includes('udp')) {
                                resolved = true;
                                clearTimeout(timeout);
                                resolve(false); // UDP работает - первый же ответ
                            }
                        };
                        
                        pc.onicegatheringstatechange = () => {
                            if (!resolved && pc.iceGatheringState === 'complete') {
                                resolved = true;
                                clearTimeout(timeout);
                                resolve(true); // UDP заблокирован
                            }
                        };
                        
                        pc.createDataChannel('');
                        pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => {
                            if (!resolved) {
                                resolved = true;
                                clearTimeout(timeout);
                                resolve(true);
                            }
                        });
                    } catch {
                        if (!resolved) {
                            resolved = true;
                            clearTimeout(timeout);
                            resolve(true);
                        }
                    }
                });
                
                const endTime = performance.now();
                const totalTime = endTime - startTime;
                const seconds = (totalTime / 1000).toFixed(3);
                
                // Отображение результата
                document.getElementById('result').textContent = isUDPBlocked ? 'UDP заблокирован' : 'UDP работает';
                document.getElementById('time').textContent = `Время: ${Math.round(totalTime)}ms (${seconds}s)`;
                
            } catch (err) {
                document.getElementById('result').textContent = 'Ошибка проверки';
                document.getElementById('time').textContent = 'Время: -';
            }
        })();
    </script>
</body>
</html>
