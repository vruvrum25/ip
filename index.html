<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Быстрая проверка прокси и osMismatch</title>
    <style>
        body { background: #181818; color: #38f1; font-family: monospace; padding: 30px; }
        .main { max-width: 700px; margin: 0 auto; }
        .result { background: #222; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .json { background: #111; color: #0fa; padding: 10px; border-radius: 6px; font-size: 15px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="main">
    <h2>Ультрабыстрая проверка прокси / антидетектов</h2>
    <div id="results" class="result">Проверка...</div>
</div>
<script>
const $ = sel => document.querySelector(sel);

// Узнаём мобильный ли UA
function isMobileUA() {
    return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
}

// Фингерпринт устройства для сравнения с User-Agent OS
function getOSFingerprint() {
    return {
        touch: 'ontouchstart' in window || navigator.maxTouchPoints > 0,
        platform: navigator.platform || 'unknown',
        deviceMem: navigator.deviceMemory || '?',
        logicalCores: navigator.hardwareConcurrency || '?',
        screenW: screen.width,
        screenH: screen.height
    };
}

// Определяем User-Agent OS
function getDeviceOs() {
    let ua = navigator.userAgent;
    if (/Windows/i.test(ua)) return "Windows";
    if (/Mac OS X/i.test(ua)) return "macOS";
    if (/Android/i.test(ua)) return "Android";
    if (/iPhone|iPad/i.test(ua)) return "iOS";
    if (/Linux/i.test(ua)) return "Linux";
    return "Unknown";
}

// Проверка глубинного osMismatch
function osMismatch(userOs, fp) {
    if (['Android','iOS'].includes(userOs)) {
        if (!fp.touch) return true;
        if (fp.screenW > 1200 || fp.platform.match(/Win|Mac|Linux/)) return true;
        if (fp.logicalCores > 8) return true;
    }
    if (userOs === "Windows" && (fp.touch || !fp.platform.match(/Win/))) return true;
    if (userOs === "macOS" && (fp.touch || !fp.platform.match(/Mac/))) return true;
    return false;
}

// Получаем публичный IP
async function getPublicIP() {
    try {
        let res = await fetch("https://api.ipify.org?format=json");
        let data = await res.json();
        return data.ip;
    } catch {
        return null;
    }
}

// WebRTC IPs (UDP)
function getWebRTCIps(timeoutMs=2000) {
    return new Promise(resolve => {
        let ips = new Set(), pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
        pc.createDataChannel(""); let done = false;
        pc.onicecandidate = e => {
            if (e.candidate) (e.candidate.candidate.match(/\d+\.\d+\.\d+\.\d+/g)||[]).forEach(ip=>ips.add(ip));
        };
        pc.onicegatheringstatechange = () => {if(pc.iceGatheringState==="complete"&&!done){done=true;pc.close();resolve([...ips]);}};
        setTimeout(()=>{if(!done){done=true;pc.close();resolve([...ips]);}},timeoutMs);
        pc.createOffer().then(o=>pc.setLocalDescription(o));
    });
}

// ASN/ISP Info
async function getIpInfo(ip) {
    try {
        let r = await fetch(`https://ip-api.io/json/${ip}`);
        return await r.json();
    } catch {
        return null;
    }
}

// Главная функция
(async ()=>{
    let userOs = getDeviceOs(), fp = getOSFingerprint(), mobile = isMobileUA();
    let osMismatchFlag = osMismatch(userOs, fp);
    let publicIP = await getPublicIP();
    let ipInfo = publicIP ? await getIpInfo(publicIP) : null;

    let html = `
    <b>OS (User-Agent):</b> ${userOs}<br>
    <b>Публичный IP:</b> ${publicIP||'Ошибка'}<br>
    <b>osMismatch:</b> <span style="color:${osMismatchFlag?'orange':'lime'};font-weight:bold">${osMismatchFlag}</span><br>
    <b>ASN/ISP:</b> ${ipInfo ? ipInfo.organization : 'Неизвестно'}<br>
    <b>Тип подключения:</b> ${ipInfo ? ipInfo.connection_type : 'Неизвестно'}<br>
    `;

    // Мобильные — только быстрый fingerprint-анализ
    if(mobile){
        html += `<b style="color:gold">Мобильное устройство: проверка только по osMismatch</b><br>`;
        if(osMismatchFlag)
            html += `<b style="color:orange;">⚠️ Есть признаки эмуляции или подмены мобильного устройства!</b><br>`;
        else
            html += `<b style="color:lime;">Всё выглядит как настоящий мобильный.</b>`;
    }else{
        // Для десктопа: дополнительно проверяем UDP/WebRTC/IP
        let webrtcIps = await getWebRTCIps();
        html += `<b>IP через WebRTC (UDP):</b> <span>${webrtcIps.length ? webrtcIps.join(', ') : 'Не удалось получить (UDP/WebRTC заблокирован)'}</span><br>`;
        if(!webrtcIps.length){
            html += `<b style="color:orange;">UDP/WebRTC-запросы заблокированы! Признак прокси или антидетекта.</b>`;
        }else if(webrtcIps.includes(publicIP)){
            html += `<b style="color:lime;">IP через UDP/WebRTC совпадает — всё нормально.</b>`;
        }else{
            html += `<b style="color:red;">IP через UDP/WebRTC не совпадает с HTTP! Это признак прокси или антидетекта.</b>`;
        }
    }

    // JSON для автоматизации
    html += `<div class="json"><pre>${JSON.stringify({
        userOs, osMismatch: osMismatchFlag, publicIP,
        isp: ipInfo ? ipInfo.organization : undefined,
        connectionType: ipInfo ? ipInfo.connection_type : undefined,
        fp, mobile
    },null,2)}</pre></div>`;

    $('#results').innerHTML = html;
})();
</script>
</body>
</html>
