<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Information</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }
        .info-item {
            margin: 15px 0;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 18px;
        }
        .info-label {
            font-weight: bold;
            display: inline-block;
            width: 120px;
        }
        #loader {
            text-align: center;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader">Загрузка данных...</div>
        <div id="result" style="display: none;">
            <div class="info-item">
                <span class="info-label">Visitor ID:</span>
                <span id="visitorId"></span>
            </div>
            <div class="info-item">
                <span class="info-label">Request ID:</span>
                <span id="requestId"></span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const FP_API_KEY = 'Ki8goVOk05JAcbWpUsmw';
            
            // Создаем Web Worker из строки кода
            const workerScript = `
                importScripts('https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs-pro@3.11.10/dist/fp.min.js');
                
                self.addEventListener('message', async (e) => {
                    if (e.data.action === 'getFingerprint') {
                        try {
                            const fp = await FingerprintJS.load({
                                apiKey: e.data.apiKey,
                                region: 'eu'
                            });
                            
                            const result = await fp.get({ extendedResult: true });
                            self.postMessage({
                                status: 'success',
                                data: {
                                    visitorId: result.visitorId,
                                    requestId: result.requestId
                                }
                            });
                        } catch (error) {
                            self.postMessage({
                                status: 'error',
                                message: error.message || 'Ошибка при получении данных'
                            });
                        }
                    }
                });
            `;
            
            const blob = new Blob([workerScript], { type: 'application/javascript' });
            const worker = new Worker(URL.createObjectURL(blob));
            
            worker.postMessage({
                action: 'getFingerprint',
                apiKey: FP_API_KEY
            });
            
            worker.onmessage = (e) => {
                if (e.data.status === 'success') {
                    document.getElementById('visitorId').textContent = e.data.data.visitorId;
                    document.getElementById('requestId').textContent = e.data.data.requestId;
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('result').style.display = 'block';
                } else {
                    document.getElementById('loader').innerHTML = \`
                        <div style="color: #e74c3c; text-align: center;">
                            <h3>Ошибка загрузки данных</h3>
                            <p>\${e.data.message || 'Неизвестная ошибка'}</p>
                            <p>Попробуйте обновить страницу</p>
                        </div>
                    \`;
                    console.error('FPJS Error:', e.data.message);
                }
                worker.terminate();
            };
            
            worker.onerror = (error) => {
                document.getElementById('loader').innerHTML = \`
                    <div style="color: #e74c3c; text-align: center;">
                        <h3>Ошибка в Web Worker</h3>
                        <p>\${error.message || 'Неизвестная ошибка воркера'}</p>
                        <p>Попробуйте обновить страницу</p>
                    </div>
                \`;
                console.error('Worker Error:', error);
                worker.terminate();
            };
        });
    </script>
</body>
</html>
