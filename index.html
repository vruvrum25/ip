<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebRTC UDP Leak Detector</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #0f0;
            background: #111;
        }
        h1 {
            text-align: center;
            color: #0f0;
            margin-top: 0;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        .result-box {
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #0f0;
            background: #000;
        }
        .ip-info {
            margin: 10px 0;
            padding: 8px;
            border-left: 3px solid #0f0;
        }
        .warning {
            color: #ff5555;
            font-weight: bold;
        }
        .hidden {
            display: none;
        }
        .loader {
            text-align: center;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #0f0;
            border-top: 4px solid #000;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>WebRTC UDP Leak Detector</h1>
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div>Testing UDP connectivity...</div>
    </div>
    <div class="result-box hidden" id="result">
        <div id="status"></div>
        <div class="ip-info" id="udpInfo"></div>
        <div class="ip-info" id="conclusion"></div>
    </div>
</div>

<script>
(function() {
    const loader = document.getElementById('loader');
    const result = document.getElementById('result');
    const status = document.getElementById('status');
    const udpInfo = document.getElementById('udpInfo');
    const conclusion = document.getElementById('conclusion');
    
    // Fast WebRTC detection with timeout
    function detectUDPLeak() {
        return new Promise((resolve) => {
            const leakedIPs = [];
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
                iceCandidatePoolSize: 0  // Уменьшаем размер пула кандидатов
            });

            let isResolved = false;
            const timeout = setTimeout(() => {
                if (!isResolved) {
                    pc.close();
                    resolve([]);
                    isResolved = true;
                }
            }, 1000);  // Таймаут 1 секунда для мобильных устройств

            pc.onicecandidate = (event) => {
                if (!event.candidate) {
                    clearTimeout(timeout);
                    if (!isResolved) {
                        resolve(leakedIPs);
                        isResolved = true;
                    }
                    return;
                }
                
                const candidate = event.candidate.candidate;
                if (candidate.indexOf('udp') === -1) return;  // Фильтр только UDP
                
                const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/;
                const match = candidate.match(ipRegex);
                
                if (match) {
                    const ip = match[0];
                    // Фильтр приватных IP
                    if (!/^(192\.168|10\.|172\.(1[6-9]|2[0-9]|3[0-1])|127\.|::1|fc00::)/i.test(ip)) {
                        leakedIPs.push(ip);
                    }
                }
            };

            pc.createDataChannel("");
            pc.createOffer({
                offerToReceiveAudio: false,  // Отключаем аудио для ускорения
                offerToReceiveVideo: false   // Отключаем видео для ускорения
            })
            .then(offer => pc.setLocalDescription(offer))
            .catch(() => {
                clearTimeout(timeout);
                if (!isResolved) resolve([]);
            });
        });
    }

    // Main function with performance optimizations
    async function runDetection() {
        try {
            const udpIPs = await detectUDPLeak();
            const uniqueUDPIPs = [...new Set(udpIPs)];
            
            loader.classList.add('hidden');
            result.classList.remove('hidden');
            
            if (uniqueUDPIPs.length > 0) {
                status.innerHTML = '<span class="warning">PROXY DETECTED!</span>';
                udpInfo.textContent = `UDP: ${uniqueUDPIPs.join(', ')}`;
                conclusion.textContent = "WebRTC UDP leak detected! Real IP exposed.";
            } else {
                status.innerHTML = '<span class="warning">UDP BLOCKED!</span>';
                udpInfo.textContent = "UDP: No leaks detected";
                conclusion.innerHTML = `UDP traffic blocked, which may mean:
• Using HTTP/SOCKS5 proxy without UDP support
• Incorrect network configuration
• WebRTC completely disabled`;
            }
        } catch (e) {
            status.textContent = "Detection failed";
            conclusion.textContent = "Error: " + e.message;
        }
    }

    // Запускаем немедленно при загрузке
    runDetection();
})();
</script>
</body>
</html>
