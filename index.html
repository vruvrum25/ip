<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Information</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }
        .info-item {
            margin: 15px 0;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 18px;
        }
        .info-label {
            font-weight: bold;
            display: inline-block;
            width: 120px;
        }
        #loader {
            text-align: center;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader">Загрузка данных...</div>
        <div id="result" style="display: none;">
            <div class="info-item">
                <span class="info-label">Visitor ID:</span>
                <span id="visitorId"></span>
            </div>
            <div class="info-item">
                <span class="info-label">Request ID:</span>
                <span id="requestId"></span>
            </div>
        </div>
    </div>

    <script>
        const FP_API_KEY = 'Ki8goVOk05JAcbWpUsmw';
        
        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('result');
            
            const handleError = (error) => {
                console.error('FingerprintJS Error:', error);
                loader.innerHTML = `
                    <div style="color: #e74c3c; text-align: center;">
                        <h3>Ошибка загрузки данных</h3>
                        <p>${error.message || error}</p>
                        <p>Попробуйте обновить страницу</p>
                    </div>
                `;
            };

            try {
                // 1. Загрузка скрипта
                const script = document.createElement('script');
                script.src = 'https://opencdn.fpjs.sh/fingerprintjs-pro-gtm/v1/iife.min.js';
                
                script.onload = () => {
                    console.log('FingerprintJS: Script loaded successfully.');
                    
                    // 2. Конфигурация параметров
                    const loadOptions = {
                        apiKey: FP_API_KEY,
                        integrationInfo: 'fingerprintjs-pro-gtm-template/1.0.0',
                        region: 'eu'
                    };
                    
                    const getOptions = {
                        extendedResult: true
                    };
                    
                    // 3. Инициализация библиотеки
                    window.FingerprintjsProGTM.load(loadOptions, () => {
                        console.log('FingerprintJS: Library initialized.');
                        
                        // 4. Получение данных
                        window.FingerprintjsProGTM.get(getOptions, (result) => {
                            console.log('FingerprintJS: Identification complete:', result);
                            
                            // 5. Отображение результатов
                            document.getElementById('visitorId').textContent = result.visitorId;
                            document.getElementById('requestId').textContent = result.requestId;
                            
                            loader.style.display = 'none';
                            resultContainer.style.display = 'block';
                        }, (error) => {
                            handleError(new Error(`Identification failed: ${error.message}`));
                        });
                    }, (error) => {
                        handleError(new Error(`Initialization failed: ${error.message}`));
                    });
                };
                
                script.onerror = (error) => {
                    handleError(new Error('Script load failed. Check CDN availability.'));
                };
                
                document.head.appendChild(script);
                
            } catch (error) {
                handleError(error);
            }
        });
    </script>
</body>
</html>
