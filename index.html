<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UDP / WebRTC IP Checker (Advanced)</title>
    <style>
        body { background: #181818; color: #38f1; font-family: monospace; padding: 30px; }
        .main { max-width: 700px; margin: 0 auto; }
        .result { background: #222; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .ice-list { font-size: 13px; color: #6fe; background: #181818; border-radius: 6px; padding: 6px; margin: 10px 0;}
    </style>
</head>
<body>
<div class="main">
    <h2>IP & UDP (WebRTC) Check <small>by ChatGPT</small></h2>
    <div id="results" class="result">Loading...</div>
</div>

<script>
async function getPublicIP() {
    try {
        let res = await fetch("https://api.ipify.org?format=json");
        let data = await res.json();
        return data.ip;
    } catch (e) { return null; }
}

function isMobile() {
    return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
}

// Массив популярных STUN-серверов (Google + Open)
const stunServers = [
    {urls: "stun:stun.l.google.com:19302"},
    {urls: "stun:stun1.l.google.com:19302"},
    {urls: "stun:stun2.l.google.com:19302"},
    {urls: "stun:stun3.l.google.com:19302"},
    {urls: "stun:stun4.l.google.com:19302"},
    {urls: "stun:stun.services.mozilla.com"},
    {urls: "stun:stun.stunprotocol.org:3478"},
    {urls: "stun:stun.sipnet.net"},
];

// Глубокий сбор ICE-кандидатов: возвращает массив объектов с инфой
function getWebRTCCandidates(timeoutMs=3500) {
    return new Promise((resolve) => {
        let candidates = [];
        let pc = new RTCPeerConnection({iceServers: stunServers});
        pc.createDataChannel("");
        pc.onicecandidate = (evt) => {
            if (!evt.candidate) return;
            // Сохраняем весь candidate-string
            let cand = evt.candidate.candidate;
            // парсим
            let parts = cand.split(' ');
            let ip = parts[4];
            let port = parts[5];
            let proto = parts[2];
            let candType = cand.match(/typ (\w+)/) ? cand.match(/typ (\w+)/)[1] : '';
            candidates.push({
                raw: cand,
                ip, port, proto, candType
            });
        };
        pc.onicegatheringstatechange = () => {
            if (pc.iceGatheringState === "complete") {
                pc.close();
                resolve(candidates);
            }
        };
        setTimeout(() => { pc.close(); resolve(candidates); }, timeoutMs);
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
    });
}

async function runCheck() {
    let results = document.getElementById("results");
    results.textContent = "Проверяем...";

    let publicIP = await getPublicIP();
    let candidates = await getWebRTCCandidates();

    // Сводим IP через WebRTC
    let webrtcIps = Array.from(new Set(candidates.map(c => c.ip).filter(Boolean)));
    let mobile = isMobile();

    // Подсчёт UDP/relay/host/tcp кандидатов
    let udpCandidates = candidates.filter(c => c.proto === 'udp');
    let tcpCandidates = candidates.filter(c => c.proto === 'tcp');
    let hostCandidates = candidates.filter(c => c.candType === 'host');
    let relayCandidates = candidates.filter(c => c.candType === 'relay');
    let srflxCandidates = candidates.filter(c => c.candType === 'srflx');

    let html = `
        <b>Ваш публичный IP (HTTP):</b> <br> <span>${publicIP || 'Ошибка'}</span><br><br>
        <b>IP через WebRTC (UDP):</b> <br> <span>${webrtcIps.length ? webrtcIps.join(', ') : 'Не удалось получить (UDP/WebRTC заблокирован)'}</span><br>
        <small>Всего ICE-кандидатов: ${candidates.length}. UDP: ${udpCandidates.length}, TCP: ${tcpCandidates.length}, relay: ${relayCandidates.length}, srflx: ${srflxCandidates.length}, host: ${hostCandidates.length}</small><br>
        <div class="ice-list"><b>Детали ICE-кандидатов:</b><br>
        ${candidates.map(c => `ip: ${c.ip}, port: ${c.port}, proto: ${c.proto}, type: ${c.candType}`).join('<br>')}
        </div>
        <b>Тип устройства:</b> <span>${mobile ? "Мобильный" : "Десктоп"}</span><br><br>
    `;

    // Логика анализа
    if (!udpCandidates.length) {
        html += `<b style="color:orange;">UDP/WebRTC кандидаты не найдены!<br>
        <span>Скорее всего, UDP заблокирован (антидетект, прокси, VPN, или настройки браузера).</span></b>`;
    } else if (!hostCandidates.length && relayCandidates.length) {
        html += `<b style="color:red;">Есть только relay-кандидаты (через TURN-серверы) — часто это VPN/Proxy!</b>`;
    } else if (webrtcIps.includes(publicIP)) {
        html += `<b style="color:lime;">IP через UDP/WebRTC совпадает с HTTP — всё нормально!</b>`;
    } else {
        if (mobile) {
            html += `<b style="color:gold;">На мобильных соединениях (3G/4G/5G) разные IP через HTTP и WebRTC — это НОРМА.<br>
            Но если только relay-кандидаты или нет UDP — возможно, используется VPN/прокси/антидетект.</b>`;
        } else {
            html += `<b style="color:red;">Обнаружено несоответствие IP!</b>
            <br>Это может быть признаком использования прокси/VPN/антидетекта.<br>
            <small>Если вы не используете мобильный интернет и ваш браузер обычный, возможно, применяется прокси/антидетект/браузер с подменой WebRTC.</small>`;
        }
    }
    results.innerHTML = html;
}

runCheck();
</script>
</body>
</html>
