<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebRTC UDP Leak Detector</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #0f0;
            background: #111;
        }
        h1 {
            text-align: center;
            color: #0f0;
            margin-top: 0;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        .result-box {
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #0f0;
            background: #000;
        }
        .ip-info {
            margin: 10px 0;
            padding: 8px;
            border-left: 3px solid #0f0;
        }
        .warning {
            color: #ff5555;
            font-weight: bold;
        }
        .hidden {
            display: none;
        }
        .loader {
            text-align: center;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #0f0;
            border-top: 4px solid #000;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>WebRTC UDP Leak Detector</h1>
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div>Testing UDP connectivity...</div>
    </div>
    <div class="result-box hidden" id="result">
        <div id="status"></div>
        <div class="ip-info" id="tcpInfo"></div>
        <div class="ip-info" id="udpInfo"></div>
        <div class="ip-info" id="conclusion"></div>
    </div>
</div>

<script>
(async function() {
    const loader = document.getElementById('loader');
    const result = document.getElementById('result');
    const status = document.getElementById('status');
    const tcpInfo = document.getElementById('tcpInfo');
    const udpInfo = document.getElementById('udpInfo');
    const conclusion = document.getElementById('conclusion');
    
    // Get visible TCP IP (from HTTP headers)
    async function getTCPIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (e) {
            return "unknown";
        }
    }
    
    // Detect WebRTC UDP leaks
    async function detectUDPLeak() {
        return new Promise((resolve) => {
            const leakedIPs = [];
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
            });

            pc.onicecandidate = (event) => {
                if (!event.candidate) {
                    pc.close();
                    resolve(leakedIPs);
                    return;
                }
                
                const candidate = event.candidate.candidate;
                const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/gi;
                const match = candidate.match(ipRegex);
                
                if (match) {
                    const ip = match[0];
                    // Filter private IPs
                    if (!ip.startsWith('192.168.') && 
                        !ip.startsWith('10.') && 
                        !ip.startsWith('172.16.') &&
                        ip !== '127.0.0.1') {
                        leakedIPs.push(ip);
                    }
                }
            };

            pc.createDataChannel("");
            pc.createOffer()
                .then(offer => pc.setLocalDescription(offer))
                .catch(e => {
                    console.error("WebRTC error:", e);
                    resolve([]);
                });
        });
    }

    // Main detection logic
    try {
        const tcpIP = await getTCPIP();
        const udpIPs = await detectUDPLeak();
        const uniqueUDPIPs = [...new Set(udpIPs)];
        
        // Remove loader
        loader.classList.add('hidden');
        result.classList.remove('hidden');
        
        // Display results
        tcpInfo.textContent = `Your IP by TCP: ${tcpIP}`;
        
        if (uniqueUDPIPs.length > 0) {
            status.innerHTML = '<span class="warning">PROXY DETECTED!</span>';
            udpInfo.textContent = `UDP: ${uniqueUDPIPs.join(', ')}`;
            conclusion.textContent = "WebRTC UDP leak detected! Real IP exposed.";
        } else {
            status.innerHTML = '<span class="warning">UDP BLOCKED!</span>';
            udpInfo.textContent = "UDP: No leaks detected";
            conclusion.innerHTML = `UDP traffic blocked, which may mean:
• Using HTTP/SOCKS5 proxy without UDP support
• Incorrect network configuration
• WebRTC completely disabled`;
        }
    } catch (e) {
        status.textContent = "Detection failed";
        conclusion.textContent = "Error: " + e.message;
    }
})();
</script>
</body>
</html>
